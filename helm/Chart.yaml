apiVersion: v2
name: threesixty-stack
description: A 3Sixty Helm chart for Kubernetes
type: application
version: 0.1.0
appVersion: "5.1.0"

dependencies:
  - name: mongo
    version: 0.1.0
    repository: file://charts/mongo

  - name: threesixty
    version: 0.1.0
    repository: file://charts/threesixty
    condition: threesixty.enabled

  - name: elasticsearch
    version: 0.1.0
    repository: file://charts/elasticsearch
    condition: elasticsearch.enabled

  - name: opensearch
    version: 0.1.0
    repository: file://charts/opensearch
    condition: opensearch.enabled

  - name: hybridsearch
    version: 0.1.0
    repository: file://charts/hybridsearch
    condition: hybridsearch.enabled
