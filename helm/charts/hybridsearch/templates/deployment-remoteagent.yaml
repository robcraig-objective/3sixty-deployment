{{- if .Values.remoteagent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybridsearch.fullname" . }}-remoteagent
  labels:
    {{- include "hybridsearch.labels" . | nindent 4 }}
    app.kubernetes.io/component: remote-agent
    app: {{ include "hybridsearch.fullname" . }}-remoteagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "hybridsearch.fullname" . }}-remoteagent
  template:
    metadata:
      labels:
        app: {{ include "hybridsearch.fullname" . }}-remoteagent
    spec:
      imagePullSecrets:
{{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .Values.remoteagent.podSecurityContext | nindent 8 }}
      containers:
        - name: remoteagent
          image: "{{ .Values.remoteagent.image.repository }}:{{ .Values.remoteagent.image.tag }}"
          imagePullPolicy: {{ .Values.remoteagent.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.remoteagent.containerSecurityContext | nindent 12 }}
          envFrom:
          - configMapRef:
              name: {{ include "hybridsearch.fullname" . }}-remoteagent-config
          - secretRef:
              name: {{ include "hybridsearch.fullname" . }}-remoteagent-secret
          resources:
            {{- toYaml .Values.remoteagent.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.remoteagent.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.remoteagent.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: {{ .Values.remoteagent.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          ports:
            - name: http
              containerPort: {{ .Values.remoteagent.service.port }}
          volumeMounts:
            - name: logs
              mountPath: {{ .Values.remoteagent.logs.emptyDir | default "/remoteagent-logs" }}
      volumes:
        - name: logs
          emptyDir: {}
{{- end }}