apiVersion: v1
kind: Service
metadata:
  name: {{ include "hybridsearch.fullname" . }}-ollama
spec:
  type: {{ .Values.ollama.service.type }}
  selector:
    app: {{ include "hybridsearch.fullname" . }}-ollama
  ports:
    - name: api
      port: {{ .Values.ollama.service.port }}
      targetPort: {{ .Values.ollama.service.port }}
