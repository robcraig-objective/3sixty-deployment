apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybridsearch.fullname" . }}-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "hybridsearch.fullname" . }}-ollama
  template:
    metadata:
      labels:
        app: {{ include "hybridsearch.fullname" . }}-ollama
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command: ["bash","-c"]
          args:
            - >
              ollama serve &
              sleep 5 &&
              ollama pull {{ .Values.ollama.model }} &&
              wait
          ports:
            - name: api
              containerPort: {{ .Values.ollama.service.port }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: {{ include "hybridsearch.fullname" . }}-ollama-data
