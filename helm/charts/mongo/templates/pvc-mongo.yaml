apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mongo.fullname" . }}-pvc
  annotations:
    # Keep this PVC when the Helm release is deleted — prevents accidental data loss.
    # To intentionally remove this PVC, delete it manually after uninstalling the release.
    helm.sh/resource-policy: keep
  labels:
    {{- include "mongo.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
