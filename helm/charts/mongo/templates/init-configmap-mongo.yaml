apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongo.fullname" . }}-init-config
  labels:
    app.kubernetes.io/name: {{ include "mongo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  MONGO_INITDB_DATABASE: {{ .Values.init.database | quote }}
  SCIM_STORAGE_MONGO_DATABASE: {{ .Values.init.scimDatabase | quote }}
  init-mongo.sh: |
    #!/bin/bash
    set -e
    
    echo "=== MongoDB Initialization Script ==="
    echo "Creating databases and users..."
    
    # Wait for MongoDB to be ready
    until mongosh --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
      echo "Waiting for MongoDB to start..."
      sleep 2
    done
    
    # Create the main application database and user
    mongosh <<EOF
    use ${MONGO_INITDB_DATABASE}
    db.createUser({
      user: "${MONGO_INITDB_ROOT_USERNAME}",
      pwd: "${MONGO_INITDB_ROOT_PASSWORD}",
      roles: [
        { role: "readWrite", db: "${MONGO_INITDB_DATABASE}" }
      ]
    })
    EOF
    
    # Create the SCIM database and user
    mongosh <<EOF
    use ${SCIM_STORAGE_MONGO_DATABASE}
    db.createUser({
      user: "${MONGO_INITDB_ROOT_USERNAME}",
      pwd: "${MONGO_INITDB_ROOT_PASSWORD}",
      roles: [
        { role: "readWrite", db: "${SCIM_STORAGE_MONGO_DATABASE}" }
      ]
    })
    EOF
    
    echo "Database initialization complete!"
