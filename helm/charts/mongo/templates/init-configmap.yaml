{{- if .Values.init.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongo.fullname" . }}-init-script
data:
  init-mongo.sh: |
    #!/bin/bash
    set -euo pipefail
    export MONGO_INITDB_DATABASE={{ .Values.init.database }}
    export SCIM_STORAGE_MONGO_DATABASE={{ .Values.init.scimDatabase }}
    export MONGO_INITDB_ROOT_USERNAME={{ .Values.init.rootUsername }}
    export MONGO_INITDB_ROOT_PASSWORD={{ .Values.init.rootPassword }}
    mongosh <<EOJS
      use $MONGO_INITDB_DATABASE
      db.createUser({
        user: "$MONGO_INITDB_ROOT_USERNAME",
        pwd:  "$MONGO_INITDB_ROOT_PASSWORD",
        roles: ["readWrite","dbAdmin"]
      });
      db.grantRolesToUser("$MONGO_INITDB_ROOT_USERNAME", [{
        role: "clusterMonitor", db: "admin"
      }]);

    use $SCIM_STORAGE_MONGO_DATABASE
    db.createUser({
        user: "$MONGO_INITDB_ROOT_USERNAME",
        pwd:  "$MONGO_INITDB_ROOT_PASSWORD",
        roles: [
          { role: "readWrite", db: "$SCIM_STORAGE_MONGO_DATABASE" },
          { role: "dbAdmin",   db: "$SCIM_STORAGE_MONGO_DATABASE" }
        ]
      });
    EOJS
{{- end }}
