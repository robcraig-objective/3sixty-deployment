# Default values for elasticsearch.

replicaCount: 1

image:
  repository: docker.elastic.co/elasticsearch/elasticsearch
  tag: "7.17.0"
  pullPolicy: IfNotPresent

# JVM heap settings
javaOpts: "-Xms512m -Xmx512m"

# Ports
service:
  type: ClusterIP
  httpPort: 9200
  transportPort: 9300

# Persistence
persistence:
  enabled: true
  storageClass: local-path
  size: 5Gi

# Cluster settings
cluster:
  discoveryType: "single-node"

# Elasticsearch official image runs the 'elasticsearch' user at UID/GID 1000.
# fsGroup 1000 ensures the elasticsearch user can write to the data PVC.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
