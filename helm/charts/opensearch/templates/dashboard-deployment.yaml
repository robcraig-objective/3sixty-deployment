apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensearch.fullname" . }}-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "opensearch.fullname" . }}-dashboards
  template:
    metadata:
      labels:
        app: {{ include "opensearch.fullname" . }}-dashboards
    spec:
      containers:
        - name: dashboards
          image: "{{ .Values.image.dashboards.repository }}:{{ .Values.image.dashboards.tag }}"
          imagePullPolicy: {{ .Values.image.dashboards.pullPolicy }}
          env:
            - name: OPENSEARCH_HOSTS
              value: '["https://{{ include "opensearch.fullname" . }}:{{ .Values.service.httpPort }}"]'
          ports:
            - name: http
              containerPort: {{ .Values.service.dashboardPort }}
