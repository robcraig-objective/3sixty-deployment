apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "opensearch.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: {{ .Values.service.httpPort }}
    # Transport port 9300 (inter-node) intentionally omitted — single-node deployment.
