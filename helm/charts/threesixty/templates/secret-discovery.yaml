# OAuth2 credentials (CLIENT_ID, TENANT_ID, CLIENT_SECRET, SCOPES) are managed
# externally via {release}-oauth2-secret, created by kubectl-create-secrets.ps1
# or aks-create-secrets.ps1 before helm install.
#
# The Discovery deployment loads them via envFrom.secretRef: {release}-oauth2-secret.
# They are NOT rendered into the Helm release manifest, keeping them out of etcd.
