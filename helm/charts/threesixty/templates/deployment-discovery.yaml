# templates/discovery-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "threesixty.fullname" . }}-discovery
  labels:
    {{- include "threesixty.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
    app: {{ include "threesixty.fullname" . }}-discovery
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "threesixty.fullname" . }}-discovery
  template:
    metadata:
      labels:
        app: {{ include "threesixty.fullname" . }}-discovery
    spec:
      imagePullSecrets:
{{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-mongo 27017; do echo "waiting for mongodb"; sleep 2; done']
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: threesixty-discovery
          image: "{{ .Values.image.registry }}/{{ .Values.image.discoveryRepo }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.discoveryPort }}
          envFrom:
            - configMapRef:
                name: {{ include "threesixty.fullname" . }}-discovery-config
            - secretRef:
                name: {{ .Release.Name }}-oauth2-secret
          resources:
            {{- toYaml .Values.resources.discovery | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /3sixty-discovery/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /3sixty-discovery/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /3sixty-discovery/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30