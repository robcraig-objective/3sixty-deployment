apiVersion: v1
kind: Service
metadata:
  name: {{ include "threesixty.fullname" . }}-admin
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "threesixty.fullname" . }}-admin
  ports:
    - name: http
      port: {{ .Values.service.adminPort }}
      targetPort: {{ .Values.service.adminPort }}
