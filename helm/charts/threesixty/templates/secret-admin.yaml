# Admin credentials (MONGODB_URI, RABBITMQ_USERNAME, RABBITMQ_PASSWORD,
# SCIM_USERNAME, SCIM_PASSWORD) are managed externally via {release}-admin-secret,
# created by kubectl-create-secrets.ps1 or aks-create-secrets.ps1 before helm install.
#
# The Admin deployment loads them via envFrom.secretRef: {release}-admin-secret.
# They are NOT rendered into the Helm release manifest, keeping them out of etcd.
