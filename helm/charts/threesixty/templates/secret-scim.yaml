# SCIM credentials (SCIM_USERNAME, SCIM_PASSWORD, SCIM_STORAGE_MONGO_CONSTR,
# SCIM_STORAGE_MONGO_DATABASE) are managed externally via {release}-scim-secret,
# created by kubectl-create-secrets.ps1 or aks-create-secrets.ps1 before helm install.
#
# The SCIM deployment loads them via envFrom.secretRef: {release}-scim-secret.
# They are NOT rendered into the Helm release manifest, keeping them out of etcd.
