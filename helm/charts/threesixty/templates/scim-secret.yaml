apiVersion: v1
kind: Secret
metadata:
  name: {{ include "threesixty.fullname" . }}-scim-secret
type: Opaque
stringData:
  SCIM_USERNAME: {{ .Values.scim.credentials.username | quote }}
  SCIM_PASSWORD: {{ .Values.scim.credentials.password | quote }}
  SCIM_STORAGE_MONGO_CONSTR: "mongodb://{{ .Values.mongodb.username }}:{{ .Values.mongodb.password }}@{{ include "threesixty.fullname" . }}-mongo:27017/{{ .Values.mongodb.scimDatabase }}?authSource={{ .Values.mongodb.scimDatabase }}"
  SCIM_STORAGE_MONGO_DATABASE: {{ .Values.mongodb.scimDatabase | quote }}
