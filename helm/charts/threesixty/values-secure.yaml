# Example secure values file for 3Sixty deployment
# This file shows the proper way to handle secrets and sensitive configuration

# MongoDB configuration - Use strong passwords in production!
mongodb:
  username: "dbuser"
  password: "your-secure-mongodb-password"  # Change this!
  database: "dbtest"
  scimDatabase: "scim-database"



# OAuth2 configuration for Discovery service
oauth2:
  clientId: "your-azure-client-id"
  tenantId: "your-azure-tenant-id"
  clientSecret: "your-azure-client-secret"

# Non-sensitive environment variables
env:
  admin:
    RABBITMQ_HOST:      "threesixty-stack-rabbitmq"
    RABBITMQ_QUEUE:     "scim-queue"
    GRPC_SERVER_START:  "true"
    GRPC_SERVER_SSL:    "false"
    GLOBAL_ORG:         "objective"

  discovery:
    OAUTH2_ENABLED:     "true"

  # RabbitMQ credentials are managed via the external Kubernetes secret
  # {release}-rabbitmq-secret (created by kubectl-create-secrets.ps1 or aks-create-secrets.ps1).
  # Do NOT set credentials here — they will not be used.
  rabbitmq: {}

  scim:
    SERVER_PORT: "8083"
    RABBITMQ_HOST: "threesixty-stack-rabbitmq"
    RABBITMQ_PORT: "5672"
    RABBITMQ_QUEUE_NAME: "scim-queue"
    RABBITMQ_EXCHANGE_NAME: "scim-exchange"
    RABBITMQ_ROUTING_KEY: "scim.routingkey"

# Image configuration
image:
  registry: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com
  adminRepo: objective3sixty
  discoveryRepo: objective3sixtydiscovery
  tag: 5.2.0            # Change to match version of 3Sixty you want to deploy
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  adminPort: 8080
  discoveryPort: 8080

# RabbitMQ configuration
rabbitmq:
  image:
    repository: rabbitmq
    tag: "4.1-management"
    pullPolicy: IfNotPresent
  username: "rabbitmq-user"
  password: "your-secure-rabbitmq-password"  # Change this!
  service:
    type: ClusterIP
    ports:
      amqp: 5672
      management: 15672

# SCIM configuration
scim:
  image:
    repository: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objectivescimserver
    tag: "1.0.5"
    pullPolicy: IfNotPresent
  config:
    serverPort: 8083
  credentials:
    username: scim-application-admin
    password: "your-secure-scim-password"  # Change this!
  service:
    type: ClusterIP
    port: 8083

# Ingress configuration
ingress:
  ingressClassName: traefik
  tls:
    - secretName: traefik-tls
      hosts:
        - tcc01.local
