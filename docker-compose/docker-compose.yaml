# =============================================================================
# 3Sixty Core Services - Docker Compose Configuration
# =============================================================================
# 
# Optional service includes (uncomment to enable):
# include:
#   - docker-compose.monitoring.yaml    # Prometheus + Grafana monitoring
#   - docker-compose.vault.yaml         # HashiCorp Vault (dev mode)
#   - docker-compose.oi-agent.yaml      # OI Remote Agent
#   - docker-compose.elasticsearch.yaml # Kibana for Elasticsearch
#
# =============================================================================

services:
  nginx:
    image: nginx:1.28.0-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"  # expose HTTPS
    depends_on:
      threesixty-admin:
        condition: service_started
      threesixty-discovery:
        condition: service_started
      scim-server:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/tls.crt:/etc/nginx/certs/tls.crt:ro
      - ./nginx/certs/tls.key:/etc/nginx/certs/tls.key:ro
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  threesixty-admin:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objective3sixty:5.2.1
    container_name: threesixty-admin
    env_file:
      - .env
    environment:
      SSL_ENABLED: false
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/3sixty-admin/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    #volumes:
    #  - ./certs:/opt/certs:ro     # <- mount your .cer files here
    #  - ./my-data:/usr/local/tomcat/localMount:rw

  threesixty-discovery:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objective3sixtydiscovery:5.2.1
    container_name: threesixty-discovery
    env_file:
      - .env
    environment:
      SSL_ENABLED: false
      APP_URI: http://threesixty-admin:8080/3sixty-admin
      OAUTH2_ENABLED: true
    depends_on:
      mongo:
        condition: service_healthy
      threesixty-admin:
        condition: service_started
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/3sixty-discovery/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    #volumes:
    #- ./vault-agent/.vault-token:/vault/.vault-token:ro

  mongo:
    image: mongo:8.0.11
    container_name: mongo
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1.5G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # OI RAG - new remote agent replacing older 3sixty-rag
  oirag:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objectiveoirag:5.0.1-RC3
    container_name: oirag
    env_file:
      - .env
    volumes:
      - ./logs:/oi-rag-logs
    depends_on:
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama:0.17.7
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: [ "bash", "-c" ]
    command: >
      "ollama serve & sleep 5 && ollama pull mxbai-embed-large && wait"
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch
    environment:
      http.host: 0.0.0.0
      network.host: 0.0.0.0
      transport.host: 127.0.0.1
      discovery.type: single-node
      compatibility.override_main_response_version: true
      bootstrap.memory_lock: true # Disable JVM heap memory swapping
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx2g"
    volumes:
      - opensearch_data:/usr/share/opensearch/data:rw
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "-u", "admin:admin", "https://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  opensearch-dashboard:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: opensearch-dashboard
    ports:
      - "15601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # SCIM user provisioning
  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: rabbitmq
    env_file:
      - .env
    ports:
      #   - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  scim-server:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objectivescimserver:1.0.5
    container_name: scim-server
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/scim/v2/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  opensearch_data:
  mongo_data:
    name: docker_mongo_data
  es_data:
  ollama_data:

networks:
  threesixty:
    name: threesixty
    driver: bridge
