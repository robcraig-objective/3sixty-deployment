# =============================================================================
# 3Sixty AFS (Alfresco) Deployment Configuration
# =============================================================================
# Alternate deployment for Alfresco EDRMS integration
# Note: Uses image version (5.2.0) 
# =============================================================================

services:
  nginx:
    image: nginx:1.28.0-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"  # expose HTTPS
    depends_on:
      threesixty-admin:
        condition: service_started
      threesixty-discovery:
        condition: service_started
      scim-server:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs/tls.crt:/etc/nginx/certs/tls.crt:ro
      - ./nginx/certs/tls.key:/etc/nginx/certs/tls.key:ro
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  threesixty-admin:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objective3sixty:5.2.0
    container_name: threesixty-admin
    env_file:
      - .env
    environment:
      SSL_ENABLED: false
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/afs-admin/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    #volumes:
    #  - ./my-data:/usr/local/tomcat/localMount:rw

  threesixty-discovery:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objective3sixtydiscovery:5.2.0
    container_name: threesixty-discovery
    env_file:
      - .env
    environment:
      SSL_ENABLED: false
      APP_URI: http://threesixty-admin:8080/afs-admin
      OAUTH2_ENABLED: false
    depends_on:
      mongo:
        condition: service_healthy
      threesixty-admin:
        condition: service_started
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/afs-federation/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    #volumes:
    #- ./vault-agent/.vault-token:/vault/.vault-token:ro

  mongo:
    image: mongo:8.0.11
    container_name: mongo
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # SCIM user provisioning
  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: rabbitmq
    env_file:
      - .env
    ports:
      #   - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  scim-server:
    image: 782396859527.dkr.ecr.ap-southeast-2.amazonaws.com/objectivescimserver:1.0.5
    container_name: scim-server
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - threesixty
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/scim/v2/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
    name: docker_mongo_data
  es_data:

networks:
  threesixty:
    name: threesixty
    driver: bridge
