user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen       443 ssl;
        server_name  _;
        
        # Enable HTTP/2
        http2 on;

        # Point at cert & key
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Request limits
        client_max_body_size 100M;
        client_body_timeout 300s;

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Proxy /afs-admin
        location /afs-admin/ {
            proxy_pass         http://threesixty-admin:8080/afs-admin/;
        }

        # Proxy /afs-federation
        location /afs-federation/ {
            proxy_pass         http://threesixty-discovery:8080/afs-federation/;
        }

        # Proxy /3sixty-admin
        location /3sixty-admin/ {
            proxy_pass         http://threesixty-admin:8080/3sixty-admin/;
        }

        # Proxy /3sixty-discovery
        location /3sixty-discovery/ {
            proxy_pass         http://threesixty-discovery:8080/3sixty-discovery/;
        }

        # Proxy /scim/v2
        location /scim/v2/ {
            proxy_pass         http://scim-server:8083/scim/v2/;
        }

        # Proxy /opensearch-dashboard
        location /opensearch-dashboard/ {
            proxy_pass         http://opensearch-dashboard:5601/;
            proxy_redirect     off;
            proxy_buffering    off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "Keep-Alive";
            proxy_set_header   Proxy-Connection "Keep-Alive";
        }

        # Proxy /kibana (optional - requires docker-compose.elasticsearch.yaml)
        location /kibana/ {
            proxy_pass         http://kibana:5601/kibana/;
            proxy_redirect     off;
            proxy_buffering    off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "Keep-Alive";
            proxy_set_header   Proxy-Connection "Keep-Alive";
            # WebSocket support for Kibana
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Everything else → 404
        location / {
            return 404;
        }
    }
}
