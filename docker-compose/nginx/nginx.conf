user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen       443 ssl;
        server_name  _;
        
        # Enable HTTP/2
        http2 on;

        # Point at cert & key
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Proxy /afs-admin
        location /afs-admin/ {
            proxy_pass         http://threesixty-admin:8080/afs-admin/;
        }

        # Proxy /afs-federation
        location /afs-federation/ {
            proxy_pass         http://threesixty-discovery:8080/afs-federation/;
        }

        # Proxy /3sixty-admin
        location /3sixty-admin/ {
            proxy_pass         http://threesixty-admin:8080/3sixty-admin/;
        }

        # Proxy /3sixty-discovery
        location /3sixty-discovery/ {
            proxy_pass         http://threesixty-discovery:8080/3sixty-discovery/;
        }

        # Proxy /scim/v2
        location /scim/v2/ {
            proxy_pass         http://scim-server:8083/scim/v2/;
        }

        # Everything else → 404
        location / {
            return 404;
        }
    }
}
