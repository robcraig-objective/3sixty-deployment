version: "3.8"

services:
  vault:
    image: hashicorp/vault:1.9.0
    container_name: vault-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    networks:
      - threesixty

networks:
  threesixty:
    name: threesixty
    driver: bridge
